services:
  bsl-atlas:
    image: armankudaibergenov/bsl-atlas:latest
    container_name: bsl-atlas
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      # Required bind mount: path to your 1C config dump (exported from Configurator)
      - ${SOURCE_PATH:-./source}:/data/source:ro
      # Persistent ChromaDB vector index
      - ${CHROMA_PATH:-./chroma_db}:/data/chroma_db
    environment:
      # --- Embedding providers ---
      # Simple setup: set OPENROUTER_API_KEY and all three use OpenRouter
      # Hybrid setup (saves API costs): indexing=openrouter, search+reindex=ollama
      # See README for details
      - INDEXING_PROVIDER=${INDEXING_PROVIDER:-openrouter}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-openrouter}
      - REINDEX_PROVIDER=${REINDEX_PROVIDER:-openrouter}

      # --- API Keys ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # --- Custom OpenAI-compatible endpoint (for local models) ---
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}

      # --- Ollama (optional, for hybrid setup) ---
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3-embedding:4b}

      # --- Indexing mode ---
      # fast: SQLite only, no API key needed (default)
      # full: SQLite + ChromaDB vectors (requires embedding provider + API key)
      - INDEXING_MODE=${INDEXING_MODE:-fast}

      # --- Logging ---
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # --- Indexing settings ---
      - AUTO_INDEX=${AUTO_INDEX:-true}
      - CHROMADB_AUTO_INDEX=${CHROMADB_AUTO_INDEX:-false}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}
      - EMBEDDING_CONCURRENCY=${EMBEDDING_CONCURRENCY:-5}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # Локальный viewer C4-диаграмм (workspace.dsl, ADR 0034).
  # Только под профилем "diagrams" — обычный `docker compose up` его не поднимает.
  # Запуск:   docker compose --profile diagrams up -d
  # Останов:  docker compose --profile diagrams down
  #
  # Архитектура (HLE-545):
  #   client → structurizr-proxy (nginx :8080) → structurizr (:8080, only docker-net)
  # Подмена Host: localhost в nginx нужна, потому что `structurizr local`
  # hard-кодит проверку Host header и режет все не-localhost запросы.
  structurizr:
    image: structurizr/structurizr
    container_name: azimuth-arch
    profiles: ["diagrams"]
    command: ["local"]
    # Внешний port mapping убран — клиенты ходят только через structurizr-proxy.
    expose:
      - "8080"
    volumes:
      - .:/usr/local/structurizr
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped

  structurizr-proxy:
    image: nginx:1.27-alpine
    container_name: azimuth-arch-proxy
    profiles: ["diagrams"]
    depends_on:
      - structurizr
    ports:
      - "8080:8080"
    volumes:
      - ./compose/structurizr-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./compose/structurizr-custom.css:/etc/nginx/structurizr-custom.css:ro
    restart: unless-stopped
