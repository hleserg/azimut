# nginx-sidecar для Structurizr Local: подмена Host: localhost (HLE-545).
#
# Structurizr `local` mode hard-кодит проверку Host header — режет любой
# не-localhost запрос ради безопасности (у local-режима нет auth).
# Мы хотим LAN-доступ → этот nginx принимает запросы на 8080, переписывает
# Host на "localhost" перед форвардом в structurizr:8080 docker-network'ом.

server {
    listen 8080;
    server_name _;

    # ── Кастомный CSS (HLE-557) — раздаём как статический файл ──────────────
    # Содержит overrides для code-блоков и inline-кода в Documentation tab.
    location = /structurizr-custom.css {
        alias /etc/nginx/structurizr-custom.css;
        default_type text/css;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        proxy_pass http://structurizr:8080;
        proxy_set_header Host "localhost";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable upstream gzip — sub_filter не работает с сжатым content.
        proxy_set_header Accept-Encoding "";

        # Structurizr с Host: localhost генерирует 302 на http://localhost/...
        # — переписываем Location в относительный путь.
        proxy_redirect http://localhost/ /;
        proxy_redirect http://localhost:8080/ /;

        # Structurizr также вшивает абсолютные URL `http://localhost/...` в
        # тело HTML и JS (XHR-вызовы клиента). Переписываем их в относительные.
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript application/json text/css;
        sub_filter "http://localhost:8080/" "/";
        sub_filter "http://localhost:80/"   "/";
        sub_filter "http://localhost/"      "/";

        # HLE-557: инжектируем кастомный CSS перед </body> в HTML-ответах.
        # Важно: НЕ в <head>, а в конце <body>, потому что Structurizr грузит
        # `structurizr-dark.css` динамически через JS (`initDarkMode`) после
        # всех head-стилей. Чтобы наши overrides выиграли cascade — они должны
        # быть загружены ПОЗЖЕ. `</body>` встречается один раз на страницу.
        sub_filter "</body>" '<link rel="stylesheet" href="/structurizr-custom.css"></body>';

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
