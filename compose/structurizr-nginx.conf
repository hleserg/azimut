# nginx-sidecar для Structurizr Local: подмена Host: localhost (HLE-545).
#
# Structurizr `local` mode hard-кодит проверку Host header — режет любой
# не-localhost запрос ради безопасности (у local-режима нет auth).
# Мы хотим LAN-доступ → этот nginx принимает запросы на 8080, переписывает
# Host на "localhost" перед форвардом в structurizr:8080 docker-network'ом.

server {
    listen 8080;
    server_name _;

    # ── Кастомные ассеты (HLE-557) — раздаём как статические файлы ─────────
    # CSS: overrides для code-блоков и inline-кода в Documentation tab.
    # JS:  hljs.registerLanguage('mermaid') чтобы убрать WARN'ы.
    # Inline-script был бы блокирован Structurizr CSP `script-src 'self'`,
    # внешний script от same-origin (`'self'`) — разрешён.
    location = /structurizr-custom.css {
        alias /etc/nginx/structurizr-custom.css;
        default_type text/css;
        add_header Cache-Control "no-cache" always;
    }

    location = /structurizr-custom.js {
        alias /etc/nginx/structurizr-custom.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache" always;
    }

    # ── /static/ — JS/CSS/img ассеты Structurizr ───────────────────────────
    # Делает ТОЛЬКО URL-rewrite localhost → relative. БЕЗ </body>-injection:
    # минифицированные JS-библиотеки (asciidoctor.min.js, hljs) содержат
    # литеральные строки '</body>' для DOM-манипуляций. Если в них вставить
    # `<link>...</body>` — JS получает SyntaxError при парсинге.
    location /static/ {
        proxy_pass http://structurizr:8080;
        proxy_set_header Host "localhost";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types application/javascript text/javascript application/json text/css;
        sub_filter "http://localhost:8080/" "/";
        sub_filter "http://localhost:80/"   "/";
        sub_filter "http://localhost/"      "/";

        proxy_http_version 1.1;
    }

    # ── Остальное (HTML страницы, /api/...) ──────────────────────────────
    location / {
        proxy_pass http://structurizr:8080;
        proxy_set_header Host "localhost";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable upstream gzip — sub_filter не работает с сжатым content.
        proxy_set_header Accept-Encoding "";

        # 302 → http://localhost/ → relative
        proxy_redirect http://localhost/ /;
        proxy_redirect http://localhost:8080/ /;

        # URL-rewrite + CSS-injection — только для HTML.
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter "http://localhost:8080/" "/";
        sub_filter "http://localhost:80/"   "/";
        sub_filter "http://localhost/"      "/";

        # HLE-557:
        # - JS в </head> чтобы зарегистрировать `mermaid` в hljs ДО того, как
        #   Documentation отрендерится. Поздняя инжекция в </body> опаздывает
        #   за hljs.highlightAll() который уже выдаёт WARN'и.
        # - CSS в </body> чтобы выиграть cascade над structurizr-dark.css,
        #   который грузится динамически через JS после <head>.
        sub_filter "</head>" '<script src="/structurizr-custom.js"></script></head>';
        sub_filter "</body>" '<link rel="stylesheet" href="/structurizr-custom.css"></body>';

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
